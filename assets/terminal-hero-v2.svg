<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="980" viewBox="0 0 1200 980" role="img" aria-labelledby="title desc">
  <title id="title">em0t terminal profile</title>
  <desc id="desc">A dark terminal-style profile card showing em0t's AI workflow, tools, and interests.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0d10"/>
      <stop offset="100%" stop-color="#151922"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#161b26"/>
      <stop offset="100%" stop-color="#1e2432"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#050607" flood-opacity="0.45"/>
    </filter>
  </defs>
  <style>
    .mono { font-family: ui-monospace, "SFMono-Regular", Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
    .label { fill: #565f89; font-size: 20px; }
    .text { fill: #c0caf5; font-size: 22px; }
    .dim { fill: #9aa5ce; font-size: 20px; }
    .accent1 { fill: #7aa2f7; }
    .accent2 { fill: #9ece6a; }
    .accent3 { fill: #f7768e; }
    .accent4 { fill: #e0af68; }
    .accent5 { fill: #bb9af7; }
    .accent6 { fill: #2ac3de; }
  </style>

  <rect x="32" y="28" width="1136" height="924" rx="28" fill="url(#bg)" filter="url(#shadow)"/>
  <rect x="32" y="28" width="1136" height="70" rx="28" fill="url(#bar)"/>
  <rect x="32" y="70" width="1136" height="20" fill="url(#bar)"/>

  <circle cx="78" cy="63" r="9" fill="#f7768e"/>
  <circle cx="108" cy="63" r="9" fill="#e0af68"/>
  <circle cx="138" cy="63" r="9" fill="#9ece6a"/>

  <text x="566" y="69" text-anchor="middle" class="mono dim">em0t@workspace</text>

  <text x="64" y="138" class="mono label">~/.em0t</text>

  <text x="64" y="188" class="mono text"><tspan class="accent1">$</tspan><tspan> whoami</tspan></text>
  <text x="98" y="224" class="mono text">em0t / ZhangYier</text>

  <text x="64" y="284" class="mono text"><tspan class="accent2">$</tspan><tspan> set --editor vim</tspan></text>
  <text x="98" y="320" class="mono dim">role  = AI workflow toolsmith</text>
  <text x="98" y="352" class="mono dim">mode  = practical</text>
  <text x="98" y="384" class="mono dim">focus = team plugins / token cost / edge cases</text>

  <text x="64" y="448" class="mono text"><tspan class="accent6">$</tspan><tspan> ls ~/active</tspan></text>
  <text x="98" y="484" class="mono text"><tspan class="accent5">1</tspan><tspan>  maintain team Claude Code plugins</tspan></text>
  <text x="98" y="518" class="mono text"><tspan class="accent5">2</tspan><tspan>  contribute to rtk</tspan></text>
  <text x="98" y="552" class="mono text"><tspan class="accent5">3</tspan><tspan>  tinkering with the lobster on a dedicated Mac mini</tspan></text>

  <text x="64" y="640" class="mono text"><tspan class="accent3">$</tspan><tspan> cat ~/.messages</tspan></text>
  <text x="98" y="676" class="mono dim">hidden token waste</text>
  <text x="98" y="708" class="mono dim">context loss in tools and prompts</text>
  <text x="98" y="740" class="mono dim">weird failures and security-shaped bugs</text>

  <text x="64" y="820" class="mono text"><tspan class="accent1">$</tspan><tspan> cat ~/.philosophy</tspan></text>
  <text x="98" y="856" class="mono dim">keep the workflow small</text>
  <text x="98" y="888" class="mono dim">keep the signal intact</text>
  <text x="98" y="920" class="mono dim">notice the edge case early</text>
</svg>
