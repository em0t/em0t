<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1220" viewBox="0 0 1200 1220" role="img" aria-labelledby="title desc">
  <title id="title">em0t terminal profile</title>
  <desc id="desc">A dark terminal-style profile card showing em0t's AI workflow, tools, and interests.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0d10"/>
      <stop offset="100%" stop-color="#151922"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#161b26"/>
      <stop offset="100%" stop-color="#1e2432"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#050607" flood-opacity="0.45"/>
    </filter>
  </defs>
  <style>
    .mono { font-family: ui-monospace, "SFMono-Regular", Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
    .label { fill: #565f89; font-size: 20px; }
    .text { fill: #c0caf5; font-size: 22px; }
    .dim { fill: #9aa5ce; font-size: 20px; }
    .accent1 { fill: #7aa2f7; }
    .accent2 { fill: #9ece6a; }
    .accent3 { fill: #f7768e; }
    .accent4 { fill: #e0af68; }
    .accent5 { fill: #bb9af7; }
    .accent6 { fill: #2ac3de; }
  </style>

  <rect x="32" y="28" width="1136" height="1164" rx="28" fill="url(#bg)" filter="url(#shadow)"/>
  <rect x="32" y="28" width="1136" height="70" rx="28" fill="url(#bar)"/>
  <rect x="32" y="70" width="1136" height="20" fill="url(#bar)"/>

  <circle cx="78" cy="63" r="9" fill="#f7768e"/>
  <circle cx="108" cy="63" r="9" fill="#e0af68"/>
  <circle cx="138" cy="63" r="9" fill="#9ece6a"/>

  <text x="566" y="69" text-anchor="middle" class="mono dim">ghostty - em0t@workspace</text>

  <text x="64" y="138" class="mono label">~/.em0t</text>

  <text x="64" y="188" class="mono text"><tspan class="accent1">$</tspan><tspan> whoami</tspan></text>
  <text x="98" y="224" class="mono text">em0t / ZhangYier</text>

  <text x="64" y="284" class="mono text"><tspan class="accent2">$</tspan><tspan> set --editor vim --role ai-workflow-toolsmith</tspan></text>
  <text x="98" y="320" class="mono dim">focus = plugins, tokens, edge_cases</text>
  <text x="98" y="352" class="mono dim">mode  = practical</text>

  <text x="64" y="416" class="mono text"><tspan class="accent6">$</tspan><tspan> ls ~/active</tspan></text>
  <text x="98" y="452" class="mono text"><tspan class="accent5">1</tspan><tspan>  plugins   maintain claude-plugins-marketplace</tspan></text>
  <text x="98" y="486" class="mono text"><tspan class="accent5">2</tspan><tspan>  rtk       contribute upstream fixes</tspan></text>
  <text x="98" y="520" class="mono text"><tspan class="accent5">3</tspan><tspan>  claw      run OpenClaw on a dedicated Mac mini</tspan></text>

  <text x="64" y="588" class="mono text"><tspan class="accent4">$</tspan><tspan> cat ~/.agents</tspan></text>
  <text x="98" y="624" class="mono text">Claude Code  90 / 50</text>
  <text x="98" y="656" class="mono text">Codex        50 / 45</text>
  <text x="98" y="688" class="mono text">Gemini       10 /  5</text>

  <text x="64" y="756" class="mono text"><tspan class="accent2">$</tspan><tspan> echo $STACK</tspan></text>
  <text x="98" y="792" class="mono dim">vim / Claude Code / Codex / Gemini</text>
  <text x="98" y="824" class="mono dim">plugins / workflow fit / cost / safety</text>

  <text x="64" y="892" class="mono text"><tspan class="accent3">$</tspan><tspan> messages</tspan></text>
  <text x="98" y="928" class="mono dim">token burn hidden by "helpful" defaults</text>
  <text x="98" y="960" class="mono dim">context loss changes model understanding</text>
  <text x="98" y="992" class="mono dim">weird failures, unsafe behavior, security bugs</text>

  <text x="64" y="1060" class="mono text"><tspan class="accent1">$</tspan><tspan> cat ~/.philosophy</tspan></text>
  <text x="98" y="1096" class="mono dim">signal &gt; noise</text>
  <text x="98" y="1128" class="mono dim">small sharp tools &gt; heavy systems</text>
  <text x="98" y="1160" class="mono dim">check edge cases early</text>
</svg>
